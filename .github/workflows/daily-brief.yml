name: Daily Brief

on:
  # 主觸發來源：Anthropic Cloud routine 每天台北 12:27 透過 repository_dispatch webhook 觸發
  # （之前的 schedule 觸發已移除 — GitHub Actions free tier schedule 經常延遲 10+ 小時造成半夜重複推送）
  workflow_dispatch:  # 手動觸發測試
  repository_dispatch:
    types: [daily_brief]

jobs:
  brief:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run daily brief
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python daily_brief.py
