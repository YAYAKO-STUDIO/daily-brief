name: Daily Brief

on:
  schedule:
    # UTC 04:27 = 台北 12:27（GitHub Actions schedule 經常延遲或跳過 — 保留為 backup）
    - cron: '27 4 * * *'
  workflow_dispatch:  # 允許手動觸發測試
  repository_dispatch:
    # 由 cron-job.org 等外部 cron service 觸發（這是 main 觸發來源，準時 < 30 秒延遲）
    types: [daily_brief]

jobs:
  brief:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run daily brief
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python daily_brief.py
